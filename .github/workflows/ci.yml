name: NeuRust CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Stage 1: 빠른 검증 (1~2분)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # Stage 2: 단위 테스트 (2~3분)
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        features:
          - "default"
          - "cache-semantic,security"
          - "full"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --features ${{ matrix.features }}

  # Stage 3: 벤치마크 (main 브랜치만)
  benchmark:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --bench pipeline_bench -- --output-format bencher
      - run: cargo bench --bench exact_cache_bench -- --output-format bencher

  # Stage 4: Docker 이미지 빌드 (main 머지 시)
  docker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          push: false
          tags: ghcr.io/neurust/neurust:latest
